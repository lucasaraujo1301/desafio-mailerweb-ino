<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reserva de Sala</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 5px;
        }

        h2 {
            color: #2c3e50;
        }

        p {
            margin: 5px 0;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Reserva {{ event_type }}</h2>

    <p><strong>Título da reunião:</strong> {{ title }}</p>
    <p><strong>Sala:</strong> {{ room }}</p>
    <p><strong>Horário:</strong> {{ schedule }}</p>
    <p><strong>Tipo de evento:</strong> {{ event_type }}</p>

    <div class="footer">
        Este é um e-mail automático de notificação de reservas.
    </div>
</div>
</body>
</html>
