services:
  app:
    build:
      context: ./backend
      args:
        - DEV=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - mailhog

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: room-booking-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # hot-reload via volume
      - /app/node_modules        # preserve container's node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://app:8000
    restart: unless-stopped
    depends_on:
      - app

  celery_worker:
    build: ./backend
    command: celery -A app worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - mailhog
    restart: always

  celery_beat:
    build: ./backend
    command: celery -A app beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - mailhog
    restart: always

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  db:
    image: postgres:15.5-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=changeme

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  dev-db-data: