repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        files: ^backend
      - id: end-of-file-fixer
        files: ^backend

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        files: ^backend
        entry: uv run ruff check --fix
        language: system
        types: [ python ]

      - id: ruff-format
        name: ruff format
        files: ^backend
        entry: uv run ruff format
        language: system
        types: [ python ]
